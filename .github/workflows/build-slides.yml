name: Build slides

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y poppler-utils

      - name: Stitch PDFs
        run: bash slides/stitch.sh

      - name: Prepare Pages content
        run: |
          mkdir -p _site
          cp slides/combined.pdf _site/combined.pdf
          cat > _site/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Slides</title>
            <style>
              body { margin: 0; background: #333; }
              embed { display: block; width: 100vw; height: 100vh; }
            </style>
          </head>
          <body>
            <embed src="combined.pdf" type="application/pdf">
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
