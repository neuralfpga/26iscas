<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIF Neuron</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="https://pyscript.net/releases/2024.11.1/core.js" type="module"></script>
  <script src="https://unpkg.com/dynsim"></script>
  <style>
    body { margin: 0; padding: 0; background: transparent; font-family: sans-serif; overflow: hidden; }
    #lif { max-width: 100%; overflow: hidden; }
  </style>
</head>
<body>

  <div id="lif" class="dynsim-python-container"
       style="min-height: 200px; display: flex; align-items: center; justify-content: center; color: #888;">
    Loading…
  </div>

  <script type="py">
from pyscript import window
import json

def step(x, state, params):
    """Leaky Integrate-and-Fire neuron (normalized)."""
    v    = state["v"]
    t    = state["t"]
    dt   = params["dt"]
    tau  = params["tau"]
    v_thresh = 1.0
    v_reset  = 0.0

    I = float(x)
    dv = (-v + I) / tau
    v_new = v + dv * dt

    spiked = v_new >= v_thresh
    if spiked:
        v_new = v_reset

    return [v_new, {"v": v_new, "z": bool(spiked), "t": t + dt}]

config = {
    "params": json.dumps([
        {"id": "tau", "label": "Time constant τ",  "min": 0, "max": 2.0, "step": 0.1, "value": 1.0},
    ]),
    "plotType": "timeseries",
    "plotConfig": json.dumps({
        "title": "Membrane Potential",
        "xaxis": {"title": "Time (ms)", "range": [0, 10]},
        "yaxis": {"title": "v", "range": [-0.2, 1.3]},
    }),
    "initialState": json.dumps({"v": 0.0, "z": False, "t": 0.0}),
    "input": json.dumps({"label": "Current I", "min": 0, "max": 2, "step": 0.1, "value": 1.1}),
    "height": 300,
    "dt": 0.05,
    "spikes": "z",
    "spikeThreshold": 1.0,
    "pauseTime": 100,
}
window.registerPythonSystem("lif", step, config)
  </script>

</body>
</html>
